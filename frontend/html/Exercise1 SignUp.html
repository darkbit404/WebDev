<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>
    </head>
    <body>
        <h1>SignUp</h1>
        <form action = "home page.html">
            <label for = "firstname">First Name</label>
            <input type = "text" id = "firstname" name = "FirstName" placeholder = "First Name" required>
            <br> <br>

            <label for = "lastname">Last Name</label>
            <input type = "text" id = "lastname" name = "LastName" placeholder = "Last Name" required>
            <br> <br>

            <p>Select you gender</p>
            <label for = "male">Male</label>
            <input type = "radio" id = "male" name = "Gender" value = "Male" required>
            <label for = "male">Female</label>
            <input type = "radio" id = "female" name = "Gender" value = "Female" required>
            <label for = "other">Others</label>
            <input type = "radio" id = "others" name = "Gender" value = "Others" required>
            <br> <br>

            <label for = "email">Email ID</label>
            <input type= "text" id = "email" name = "Email" placeholder = "Email">
            <br> <br>

            <label for = "username">Username</label>
            <input type = "text" id = "username" name = "Username" placeholder = "username" required>
            <br> <br>

            <label for = "newpassword">New Password</label>
            <input type = "text" id = "newpassword" name = "NewPassword" placeholder = "Cerate a new password" required>
            <br> <br>

            <label for = "re-enterpassword">Re-Enter Password</label>
            <input type = "text" id = "re-enterpassword" name = "Re-EnterPassword" placeholder = "Re-Enter Password">
            <br> <br>

            <input type = "Submit" value = "SignUp">

        </form>
    </body>
</html>
